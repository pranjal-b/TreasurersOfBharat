<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Treasurers of Bharat — Admin dashboard" />
  <title>Admin · Treasurers of Bharat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="index.html#top" aria-label="Treasurers of Bharat home">
        <img
          class="brand__logo"
          src="assets/logo.png"
          width="56"
          height="112"
          alt=""
          decoding="async"
        />
        <span class="brand__text">
          <span class="brand__title">Treasurers of Bharat</span>
          <span class="brand__tagline">India's exclusive Treasury community</span>
        </span>
      </a>
      <a class="btn btn--header" href="index.html#waitlist">Join Waitlist</a>
    </div>
  </header>

  <main id="main">
    <section class="admin">
      <div class="container admin__inner">
        <header class="admin__header">
          <h1 class="admin__title">Admin Dashboard</h1>
          <p class="admin__subtitle">Sign in to view waitlist registrations.</p>
        </header>

        <div class="admin__grid">
          <div class="form-card admin__card">
            <header class="form-card__header">
              <h2 class="form-card__heading">Admin login</h2>
              <p class="form-card__intro">Use your Supabase Auth email + password.</p>
            </header>

            <form class="form form--admin-login" method="post" action="#">
              <div class="form__field">
                <label for="admin_email">
                  Email <span class="form__required" aria-hidden="true">*</span>
                </label>
                <input id="admin_email" name="email" type="email" autocomplete="email" required />
              </div>
              <div class="form__field">
                <label for="admin_password">
                  Password <span class="form__required" aria-hidden="true">*</span>
                </label>
                <input id="admin_password" name="password" type="password" autocomplete="current-password" required />
              </div>

              <div
                id="admin-status"
                class="form__status"
                role="status"
                aria-live="polite"
                tabindex="-1"
                hidden
              ></div>

              <button type="submit" class="btn btn--waitlist btn--block">Sign in</button>
            </form>

            <div class="admin__actions">
              <button id="admin-logout" type="button" class="btn btn--secondary" hidden>Log out</button>
              <button id="admin-refresh" type="button" class="btn btn--secondary" hidden>Refresh</button>
            </div>
          </div>

          <div class="admin__table-card">
            <header class="admin__table-header">
              <h2 class="admin__table-title">Waitlist signups</h2>
              <p class="admin__table-subtitle" id="admin-user" aria-live="polite"></p>
            </header>

            <div class="admin__table-wrap" role="region" aria-label="Waitlist registrations table" tabindex="0">
              <table class="admin-table" id="admin-table" hidden>
                <thead>
                  <tr>
                    <th scope="col">Created</th>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Designation</th>
                    <th scope="col">LinkedIn</th>
                    <th scope="col">Phone</th>
                    <th scope="col">Type</th>
                  </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
              </table>

              <div class="admin__empty" id="admin-empty" hidden>
                Sign in to load data.
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="supabase.config.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
